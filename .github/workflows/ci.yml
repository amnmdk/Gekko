name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Black format check
        run: black --check src/ tests/

      - name: Mypy type check
        run: mypy src/ndbot/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # Non-blocking until type annotations are complete

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Syntax check all Python files
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('src'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path) as fh:
                          src = fh.read()
                      try:
                          ast.parse(src)
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              for e in errors: print('SYNTAX ERROR:', e)
              sys.exit(1)
          print(f'All Python files pass syntax check.')
          "

  docker-build:
    name: Docker Build (ARM64 simulation)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          tags: ndbot:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
