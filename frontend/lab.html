<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NDBOT &mdash; Research Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #06b6d4;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --purple: #a855f7;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .topbar { display:flex; align-items:center; gap:16px; padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border); }
    .topbar .logo { font-weight:700; font-size:18px; color:var(--accent); }
    .topbar .logo span { font-size:11px; color:var(--text-dim); }
    .topbar a { color:var(--text-dim); text-decoration:none; font-size:13px; }
    .topbar a:hover { color:var(--accent); }
    .container { max-width:1400px; margin:0 auto; padding:24px; }
    h2 { font-size:20px; font-weight:600; margin-bottom:16px; color:var(--accent); }
    h3 { font-size:15px; font-weight:600; margin-bottom:12px; color:var(--text); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(400px,1fr)); gap:20px; margin-bottom:24px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat { padding:8px 12px; background:rgba(6,182,212,0.05); border-radius:8px; }
    .stat .label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
    .stat .value { font-size:18px; font-weight:600; margin-top:2px; }
    .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .badge-green { background:rgba(34,197,94,0.15); color:var(--green); }
    .badge-red { background:rgba(239,68,68,0.15); color:var(--red); }
    .badge-yellow { background:rgba(234,179,8,0.15); color:var(--yellow); }
    .badge-purple { background:rgba(168,85,247,0.15); color:var(--purple); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:8px; color:var(--text-dim); font-weight:500; border-bottom:1px solid var(--border); }
    td { padding:8px; border-bottom:1px solid rgba(30,41,59,0.5); }
    .bar-chart { display:flex; align-items:flex-end; gap:4px; height:80px; margin-top:8px; }
    .bar { background:var(--accent); border-radius:3px 3px 0 0; min-width:24px; transition:height 0.3s; position:relative; }
    .bar .bar-label { position:absolute; bottom:-18px; left:50%; transform:translateX(-50%); font-size:9px; color:var(--text-dim); white-space:nowrap; }
    .loading { color:var(--text-dim); font-style:italic; }
    #modules-grid { display:flex; flex-wrap:wrap; gap:6px; }
    .module-chip { padding:4px 10px; border-radius:6px; font-size:11px; font-weight:500; }
    .module-on { background:rgba(34,197,94,0.15); color:var(--green); }
    .module-off { background:rgba(239,68,68,0.1); color:var(--red); }
    .btn { padding:8px 16px; border:1px solid var(--accent); background:transparent; color:var(--accent); border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; }
    .btn:hover { background:rgba(6,182,212,0.1); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">NDBOT <span>Research Lab</span></div>
  <a href="/">← Trading Dashboard</a>
  <a href="#" onclick="loadAll()">↻ Refresh All</a>
</div>

<div class="container">

  <h2>Research Lab Overview</h2>

  <!-- Module Status -->
  <div class="card" style="margin-bottom:20px">
    <h3>Module Status</h3>
    <div id="modules-grid"><span class="loading">Loading...</span></div>
  </div>

  <div class="grid">

    <!-- Regime Classification -->
    <div class="card">
      <h3>Regime Classification</h3>
      <div id="regime-content"><span class="loading">Loading...</span></div>
    </div>

    <!-- Edge Decay -->
    <div class="card">
      <h3>Edge Decay Monitor</h3>
      <div id="edge-content"><span class="loading">Loading...</span></div>
    </div>

    <!-- Portfolio Optimization -->
    <div class="card">
      <h3>Portfolio Optimization</h3>
      <div id="portfolio-content"><span class="loading">Loading...</span></div>
    </div>

    <!-- Model Comparison -->
    <div class="card">
      <h3>Model Comparison</h3>
      <div id="models-content"><span class="loading">Loading...</span></div>
    </div>

    <!-- Multi-Agent Simulation -->
    <div class="card">
      <h3>Multi-Agent Simulation</h3>
      <div id="sim-content">
        <button class="btn" onclick="runSimulation()">Run Simulation</button>
        <div id="sim-result" style="margin-top:12px"></div>
      </div>
    </div>

    <!-- Corpus Stats -->
    <div class="card">
      <h3>News Corpus</h3>
      <div id="corpus-content"><span class="loading">Loading...</span></div>
    </div>

  </div>
</div>

<script>
const API = window.location.origin + '/api/lab';

async function fetchJSON(path) {
  try {
    const r = await fetch(API + path);
    return await r.json();
  } catch(e) {
    return { error: e.message };
  }
}

function badge(text, cls) {
  return `<span class="badge badge-${cls}">${text}</span>`;
}

async function loadModules() {
  const d = await fetchJSON('/status');
  const el = document.getElementById('modules-grid');
  if (d.error) { el.innerHTML = `<span class="loading">${d.error}</span>`; return; }
  el.innerHTML = Object.entries(d.modules || {}).map(([k, v]) =>
    `<span class="module-chip ${v?'module-on':'module-off'}">${k.replace(/_/g,' ')}</span>`
  ).join('');
}

async function loadRegime() {
  const d = await fetchJSON('/regime');
  const el = document.getElementById('regime-content');
  if (d.error) { el.innerHTML = `<span class="loading">${d.error}</span>`; return; }
  const r = d.regime || {};
  const a = d.adaptation || {};
  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="label">Volatility</div><div class="value">${badge(r.volatility||'?', r.volatility==='HIGH'?'red':r.volatility==='LOW'?'green':'yellow')}</div></div>
      <div class="stat"><div class="label">Macro</div><div class="value">${badge(r.macro||'?', r.macro==='EXPANSION'?'green':r.macro==='CONTRACTION'?'red':'yellow')}</div></div>
      <div class="stat"><div class="label">Liquidity</div><div class="value">${badge(r.liquidity||'?', r.liquidity==='ABUNDANT'?'green':r.liquidity==='SCARCE'?'red':'yellow')}</div></div>
      <div class="stat"><div class="label">Confidence</div><div class="value">${((r.confidence||0)*100).toFixed(0)}%</div></div>
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--text-dim)">
      Size: ${(a.size_multiplier||1).toFixed(2)}x | Threshold: ${(a.signal_threshold||0.6).toFixed(2)} | Max Pos: ${a.max_positions||5}
    </div>
  `;
}

async function loadEdge() {
  const d = await fetchJSON('/edge-decay');
  const el = document.getElementById('edge-content');
  if (d.error) { el.innerHTML = `<span class="loading">${d.error}</span>`; return; }
  const cls = d.status==='active'?'green':d.status==='warning'?'yellow':'red';
  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="label">Status</div><div class="value">${badge(d.status||'?', cls)}</div></div>
      <div class="stat"><div class="label">Current Sharpe</div><div class="value">${(d.current_sharpe||0).toFixed(3)}</div></div>
      <div class="stat"><div class="label">Peak Sharpe</div><div class="value">${(d.peak_sharpe||0).toFixed(3)}</div></div>
      <div class="stat"><div class="label">Decay</div><div class="value">${(d.decay_pct||0).toFixed(1)}%</div></div>
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--text-dim)">${d.recommendation||''}</div>
  `;
}

async function loadPortfolio() {
  const d = await fetchJSON('/portfolio/optimize');
  const el = document.getElementById('portfolio-content');
  if (d.error) { el.innerHTML = `<span class="loading">${d.error}</span>`; return; }
  const allocs = d.allocations || [];
  el.innerHTML = `
    <table>
      <tr><th>Method</th><th>Sharpe</th><th>E[r]%</th><th>Vol%</th></tr>
      ${allocs.slice(0,6).map(a => `<tr>
        <td>${a.method.replace(/_/g,' ')}</td>
        <td style="color:${a.sharpe_ratio>0?'var(--green)':'var(--red)'}">${(a.sharpe_ratio||0).toFixed(3)}</td>
        <td>${((a.expected_return||0)*100).toFixed(2)}</td>
        <td>${((a.expected_risk||0)*100).toFixed(2)}</td>
      </tr>`).join('')}
    </table>
  `;
}

async function loadModels() {
  const d = await fetchJSON('/models/compare');
  const el = document.getElementById('models-content');
  if (d.error) { el.innerHTML = `<span class="loading">${d.error}</span>`; return; }
  const models = d.models || [];
  el.innerHTML = `
    <table>
      <tr><th>Model</th><th>Sharpe</th><th>Hit Rate</th><th>Accuracy</th></tr>
      ${models.map(m => `<tr>
        <td>${m.model_name=== d.best_model ? '★ ':''} ${m.model_name.replace(/_/g,' ')}</td>
        <td style="color:${m.sharpe_ratio>0?'var(--green)':'var(--red)'}">${(m.sharpe_ratio||0).toFixed(3)}</td>
        <td>${((m.hit_rate||0)*100).toFixed(1)}%</td>
        <td>${((m.accuracy||0)*100).toFixed(1)}%</td>
      </tr>`).join('')}
    </table>
    <div style="margin-top:8px;font-size:12px;color:var(--text-dim)">
      Ensemble Sharpe: ${(d.ensemble_sharpe||0).toFixed(3)}
    </div>
  `;
}

async function runSimulation() {
  document.getElementById('sim-result').innerHTML = '<span class="loading">Running simulation...</span>';
  const d = await fetchJSON('/simulation/run');
  const el = document.getElementById('sim-result');
  if (d.error) { el.innerHTML = `<span class="loading">${d.error}</span>`; return; }
  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="label">Steps</div><div class="value">${d.n_steps}</div></div>
      <div class="stat"><div class="label">Trades</div><div class="value">${d.n_trades}</div></div>
      <div class="stat"><div class="label">Events</div><div class="value">${d.events_injected}</div></div>
      <div class="stat"><div class="label">News PnL</div><div class="value" style="color:${d.news_trader_pnl>=0?'var(--green)':'var(--red)'}">${(d.news_trader_pnl||0).toFixed(2)}</div></div>
    </div>
    <table style="margin-top:8px">
      <tr><th>Agent</th><th>Type</th><th>PnL</th><th>Trades</th></tr>
      ${(d.agent_results||[]).slice(0,8).map(a => `<tr>
        <td>${a.agent_id}</td>
        <td>${a.type}</td>
        <td style="color:${a.pnl>=0?'var(--green)':'var(--red)'}">${(a.pnl||0).toFixed(2)}</td>
        <td>${a.trades}</td>
      </tr>`).join('')}
    </table>
  `;
}

async function loadCorpus() {
  const d = await fetchJSON('/corpus/stats');
  const el = document.getElementById('corpus-content');
  if (d.error) { el.innerHTML = `<span class="loading">No corpus loaded — run research pipeline first</span>`; return; }
  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="label">Total Records</div><div class="value">${d.total_records||0}</div></div>
      <div class="stat"><div class="label">Sources</div><div class="value">${d.unique_sources||0}</div></div>
    </div>
  `;
}

function loadAll() {
  loadModules();
  loadRegime();
  loadEdge();
  loadPortfolio();
  loadModels();
  loadCorpus();
}

loadAll();
</script>
</body>
</html>
